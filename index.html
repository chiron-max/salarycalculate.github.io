<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>月度工作时长统计</title>
  <style>
    :root {
      --bg: #f5f5f7;
      --panel: rgba(255, 255, 255, 0.82);
      --panel-solid: #ffffff;
      --text: #111111;
      --muted: #6b7280;
      --line: rgba(17, 17, 17, 0.08);
      --shadow: 0 18px 50px rgba(0, 0, 0, 0.06);
      --radius: 24px;
      --radius-sm: 16px;
      --primary: #0a84ff;
      --primary-soft: rgba(10, 132, 255, 0.12);
      --success: #34c759;
      --warning: #ff9f0a;
      --danger: #ff3b30;
      --night: #5e5ce6;
      --normal: #0a84ff;
      --overtime: #ff9f0a;
      --custom: #8e8e93;
      
      /* 主题相关变量 */
      --weekend-bg: #e8f5e9;
      --weekend-text: #2e7d32;
      --today-border: rgba(10,132,255,0.4);
      --selected-bg: rgba(10,132,255,0.08);
      --conflict-bg: rgba(255, 59, 48, 0.05);
    }

    /* 深色主题 - iOS风格 */
    .theme-dark {
      --bg: #000000;
      --panel: rgba(44, 44, 46, 0.82);
      --panel-solid: #1c1c1e;
      --text: #f2f2f7;
      --muted: #8e8e93;
      --line: rgba(255, 255, 255, 0.1);
      --shadow: 0 18px 50px rgba(0, 0, 0, 0.3);
      --primary: #0a8cff;
      --primary-soft: rgba(10, 140, 255, 0.12);
      --success: #30d158;
      --warning: #ff9f0a;
      --danger: #ff453a;
      --night: #5e5ce6;
      --normal: #0a8cff;
      --overtime: #ff9f0a;
      --custom: #8e8e93;
      --weekend-bg: #2c2c2e;
      --weekend-text: #8e8e93;
      --today-border: rgba(10, 140, 255, 0.4);
      --selected-bg: rgba(10, 140, 255, 0.08);
      --conflict-bg: rgba(255, 69, 58, 0.05);
    }

    /* 蓝色主题 */
    .theme-blue {
      --bg: #e3f2fd;
      --panel: rgba(255, 255, 255, 0.82);
      --panel-solid: #ffffff;
      --text: #102040;
      --muted: #546e7a;
      --line: rgba(16, 32, 64, 0.08);
      --shadow: 0 18px 50px rgba(16, 32, 64, 0.06);
      --primary: #1976d2;
      --primary-soft: rgba(25, 118, 210, 0.12);
      --success: #43a047;
      --warning: #fb8c00;
      --danger: #e53935;
      --night: #5e35b1;
      --normal: #1976d2;
      --overtime: #fb8c00;
      --custom: #78909c;
      --weekend-bg: #e1f5fe;
      --weekend-text: #0277bd;
      --today-border: rgba(25, 118, 210, 0.4);
      --selected-bg: rgba(25, 118, 210, 0.08);
      --conflict-bg: rgba(229, 57, 53, 0.05);
    }

    /* 紫色主题 */
    .theme-purple {
      --bg: #f3e5f5;
      --panel: rgba(255, 255, 255, 0.82);
      --panel-solid: #ffffff;
      --text: #311b32;
      --muted: #7e57c2;
      --line: rgba(49, 27, 50, 0.08);
      --shadow: 0 18px 50px rgba(49, 27, 50, 0.06);
      --primary: #7b1fa2;
      --primary-soft: rgba(123, 31, 162, 0.12);
      --success: #689f38;
      --warning: #f57c00;
      --danger: #d32f2f;
      --night: #303f9f;
      --normal: #7b1fa2;
      --overtime: #f57c00;
      --custom: #5d4037;
      --weekend-bg: #f1e8f6;
      --weekend-text: #6a1b9a;
      --today-border: rgba(123, 31, 162, 0.4);
      --selected-bg: rgba(123, 31, 162, 0.08);
      --conflict-bg: rgba(211, 47, 47, 0.05);
    }

    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      background:
        radial-gradient(circle at top left, rgba(10,132,255,0.08), transparent 35%),
        radial-gradient(circle at top right, rgba(94,92,230,0.08), transparent 30%),
        var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    button, input, select { font: inherit; }
    button { cursor: pointer; }

    .app {
      max-width: 1600px;
      margin: 0 auto;
      padding: 20px;
    }

    .topbar {
      display: flex;
      gap: 16px;
      justify-content: space-between;
      align-items: center;
      padding: 18px 20px;
      border: 1px solid var(--line);
      background: var(--panel);
      backdrop-filter: blur(20px);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      min-width: 0;
    }

    .brand-mark {
      width: 46px;
      height: 46px;
      border-radius: 16px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, #0a84ff, #5e5ce6);
      color: white;
      font-size: 20px;
      font-weight: 700;
      flex: 0 0 auto;
    }

    .brand h1 { margin: 0; font-size: 20px; letter-spacing: -0.02em; }
    .brand p { margin: 4px 0 0; color: var(--muted); font-size: 13px; }

    .topbar-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: flex-end;
    }

    .ghost-btn, .primary-btn {
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px 16px; /* 增加触摸面积 */
      background: rgba(255,255,255,0.72);
      color: var(--text);
      transition: transform .15s ease, background .15s ease, border-color .15s ease, opacity .15s ease;
      min-height: 44px; /* 符合触摸标准 */
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .theme-dark .ghost-btn, .theme-dark .primary-btn {
      background: rgba(58, 58, 60, 0.72);
      border: 1px solid rgba(84, 84, 86, 0.72);
    }

    .ghost-btn:hover, .primary-btn:hover {
      transform: translateY(-1px);
      border-color: rgba(10,132,255,0.25);
    }

    .theme-dark .ghost-btn:hover, .theme-dark .primary-btn:hover {
      border-color: rgba(10, 140, 255, 0.35);
    }

    .primary-btn {
      background: var(--primary);
      color: white;
      border-color: transparent;
    }

    .danger-btn {
      border: 1px solid rgba(255,59,48,0.2);
      border-radius: 14px;
      padding: 12px 16px;
      background: rgba(255,59,48,0.06);
      color: var(--danger);
      transition: transform .15s ease, background .15s ease;
      min-height: 44px;
    }

    .danger-btn:hover {
      transform: translateY(-1px);
      background: rgba(255,59,48,0.12);
    }

    .month-label { min-width: 128px; }

    /* 多选按钮状态样式 */
    .multi-select-active {
      border-color: var(--primary) !important;
      background: var(--primary-soft) !important;
      color: var(--primary) !important;
      box-shadow: 0 0 0 3px rgba(10,132,255,0.2);
    }

    .summary-grid {
      margin-top: 18px;
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 14px;
    }

    .stat-card {
      border-radius: var(--radius);
      border: 1px solid var(--line);
      background: var(--panel);
      backdrop-filter: blur(20px);
      box-shadow: var(--shadow);
      padding: 18px;
      min-height: 112px;
    }

    .stat-card .label { color: var(--muted); font-size: 13px; }
    .stat-card .value { margin-top: 14px; font-size: 30px; font-weight: 700; letter-spacing: -0.04em; }
    .stat-card .sub { margin-top: 8px; color: var(--muted); font-size: 12px; }

    .main-layout {
      margin-top: 18px;
      display: grid;
      grid-template-columns: minmax(0, 1.55fr) minmax(360px, 0.85fr);
      gap: 18px;
      align-items: start;
    }

    .calendar-panel, .panel-card {
      border-radius: var(--radius);
      border: 1px solid var(--line);
      background: var(--panel);
      backdrop-filter: blur(20px);
      box-shadow: var(--shadow);
    }

    .calendar-panel { padding: 18px; }

    .panel-head, .inspector-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
    }

    .panel-head h2, .inspector-head h2 { margin: 0; font-size: 18px; }
    .panel-head p, .inspector-head p, .form-hint {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.55;
    }

    .legend {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: flex-end;
      color: var(--muted);
      font-size: 12px;
    }

    .legend span { display: inline-flex; align-items: center; gap: 6px; }

    .dot {
      width: 9px;
      height: 9px;
      border-radius: 999px;
      display: inline-block;
    }

    .dot.normal { background: var(--normal); }
    .dot.overtime { background: var(--overtime); }
    .dot.night { background: var(--night); }
    .dot.custom { background: var(--custom); }

    .weekday-row {
      margin-top: 18px;
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      gap: 8px; /* 移动端减小间距 */
    }

    .weekday-row div {
      text-align: center;
      color: var(--muted);
      font-size: 12px;
      padding: 8px 0; /* 增加触摸面积 */
    }

    .calendar-grid {
      margin-top: 8px;
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      gap: 8px; /* 移动端减小间距 */
    }

    .day-cell {
      position: relative;
      min-height: 120px; /* 移动端减小高度 */
      border-radius: 16px; /* 移动端稍微减小圆角 */
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.7);
      overflow: hidden;
      padding: 8px; /* 减少内边距 */
      display: flex;
      flex-direction: column;
      gap: 6px; /* 减小间距 */
      transition: transform .15s ease, border-color .15s ease, box-shadow .15s ease;
    }

    .theme-dark .day-cell {
      background: rgba(58, 58, 60, 0.7);
    }

    .day-cell:hover {
      transform: translateY(-2px);
      border-color: rgba(10,132,255,0.24);
      box-shadow: 0 10px 28px rgba(0,0,0,0.06);
    }

    .theme-dark .day-cell:hover {
      border-color: rgba(10, 140, 255, 0.24);
      box-shadow: 0 10px 28px rgba(0, 0, 0, 0.12);
    }

    .day-cell.empty { opacity: .4; background: rgba(255,255,255,0.35); }
    .theme-dark .day-cell.empty { background: rgba(58, 58, 60, 0.35); }

    .day-cell.today { border-color: var(--today-border); box-shadow: inset 0 0 0 1px rgba(10,132,255,0.12); }
    .day-cell.selected { background: var(--selected-bg); border-color: rgba(10,132,255,0.35); }
    .day-cell.multiselected { outline: 2px solid rgba(10,132,255,0.35); outline-offset: -2px; }
    .day-cell.conflict {
      border: 3px solid var(--danger) !important;
      box-shadow: 0 0 10px rgba(255, 59, 48, 0.3) !important;
      background: var(--conflict-bg) !important;
    }

    /* 周末特殊样式 */
    .day-cell.weekend {
      background: var(--weekend-bg);
      color: var(--weekend-text);
    }

    .day-top { display: flex; justify-content: space-between; gap: 8px; align-items: flex-start; }
    .day-num { display: flex; flex-direction: column; gap: 2px; }
    .day-num strong { font-size: 15px; } /* 移动端字体稍小 */
    .day-num small { color: var(--muted); font-size: 11px; }
    .day-total { text-align: right; }
    .day-total strong { display: block; font-size: 14px; } /* 移动端字体稍小 */
    .day-total small { color: var(--muted); font-size: 10px; } /* 移动端字体稍小 */

    .timeline {
      position: relative;
      flex: 1;
      border-radius: 14px;
      background:
        linear-gradient(to right, rgba(17,17,17,0.04) 1px, transparent 1px) 0 0 / 4.16% 100%,
        linear-gradient(to top, rgba(17,17,17,0.04), rgba(17,17,17,0.04));
      overflow: hidden;
      min-height: 50px; /* 移动端减小高度 */
    }

    .theme-dark .timeline {
      background:
        linear-gradient(to right, rgba(255,255,255,0.04) 1px, transparent 1px) 0 0 / 4.16% 100%,
        linear-gradient(to top, rgba(255,255,255,0.04), rgba(255,255,255,0.04));
    }

    .segment-piece {
      position: absolute;
      top: 18px; /* 移动端调整位置 */
      height: 16px; /* 移动端减小高度 */
      border-radius: 999px;
      opacity: .92;
    }

    .segment-piece.normal { background: linear-gradient(135deg, rgba(10,132,255,0.95), rgba(10,132,255,0.72)); }
    .segment-piece.overtime { background: linear-gradient(135deg, rgba(255,159,10,0.95), rgba(255,159,10,0.72)); }
    .segment-piece.night { background: linear-gradient(135deg, rgba(94,92,230,0.95), rgba(94,92,230,0.72)); }
    .segment-piece.custom { background: linear-gradient(135deg, rgba(142,142,147,0.95), rgba(142,142,147,0.72)); }
    .segment-piece.conflict { background: linear-gradient(135deg, rgba(255,59,48,0.95), rgba(255,59,48,0.72)); }

    .segment-tags { display: flex; gap: 6px; flex-wrap: wrap; }

    .segment-tag {
      font-size: 10px;
      padding: 4px 7px; /* 移动端减小内边距 */
      border-radius: 999px;
      background: rgba(17,17,17,0.05);
      color: rgba(17,17,17,0.72);
      max-width: 100%;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    .theme-dark .segment-tag {
      background: rgba(255, 255, 255, 0.05);
      color: rgba(255, 255, 255, 0.72);
    }

    .day-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: var(--muted);
      font-size: 11px; /* 移动端字体稍小 */
    }

    .conflict-warning {
      color: var(--danger);
      font-weight: bold;
      text-align: center;
      margin-top: 5px;
      font-size: 12px;
    }

    .side-panel { display: flex; flex-direction: column; gap: 18px; }
    .panel-card { padding: 18px; }

    .selection-badge {
      background: var(--primary-soft);
      color: var(--primary);
      border-radius: 999px;
      padding: 8px 10px;
      font-size: 12px;
      white-space: nowrap;
    }

    .chips { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 16px; }

    .chip {
      font-size: 12px;
      border-radius: 999px;
      padding: 7px 10px;
      background: rgba(17,17,17,0.06);
      color: rgba(17,17,17,0.76);
    }

    .theme-dark .chip {
      background: rgba(255, 255, 255, 0.06);
      color: rgba(255, 255, 255, 0.76);
    }

    .segments-list { margin-top: 16px; display: flex; flex-direction: column; gap: 10px; }

    .segment-item {
      border: 1px solid var(--line);
      border-radius: 18px;
      background: rgba(255,255,255,0.72);
      padding: 12px;
    }

    .theme-dark .segment-item {
      background: rgba(58, 58, 60, 0.72);
    }

    .segment-item.conflict {
      border: 2px solid var(--danger);
      background: rgba(255, 59, 48, 0.1);
    }

    .theme-dark .segment-item.conflict {
      background: rgba(255, 69, 58, 0.1);
    }

    .segment-item .row { display: flex; justify-content: space-between; gap: 10px; align-items: flex-start; }
    .segment-item .title { font-weight: 600; }
    .segment-item .meta { margin-top: 6px; color: var(--muted); font-size: 12px; line-height: 1.5; }

    .segment-actions { display: flex; gap: 8px; flex-wrap: wrap; }

    .segment-actions button {
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.82);
      border-radius: 12px;
      padding: 8px 12px; /* 移动端增加触摸面积 */
      font-size: 12px;
      min-height: 40px; /* 符合触摸标准 */
    }

    .theme-dark .segment-actions button {
      background: rgba(58, 58, 60, 0.82);
      border: 1px solid rgba(84, 84, 86, 0.72);
    }

    .form-divider { margin: 18px 0; height: 1px; background: var(--line); }

    .segment-form { display: flex; flex-direction: column; gap: 12px; }

    .field { display: flex; flex-direction: column; gap: 7px; }
    .field > span { color: var(--muted); font-size: 13px; }

    .field input,
    .field select {
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.9);
      color: var(--text);
      border-radius: 14px;
      padding: 12px; /* 移动端增加内边距 */
      outline: none;
      min-height: 44px; /* 符合触摸标准 */
    }

    .theme-dark .field input,
    .theme-dark .field select {
      background: rgba(58, 58, 60, 0.9);
      border: 1px solid rgba(84, 84, 86, 0.72);
    }

    .field input:focus,
    .field select:focus {
      border-color: rgba(10,132,255,0.35);
      box-shadow: 0 0 0 3px rgba(10,132,255,0.08);
    }

    .theme-dark .field input:focus,
    .theme-dark .field select:focus {
      border-color: rgba(10, 140, 255, 0.35);
      box-shadow: 0 0 0 3px rgba(10, 140, 255, 0.08);
    }

    .field-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; }
    .form-actions { display: flex; gap: 10px; flex-wrap: wrap; }

    /* ─── Profile Modal ─────────────────────────────── */

    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.42);
      backdrop-filter: blur(6px);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      opacity: 0;
      transition: opacity .2s ease;
    }

    .modal-overlay.visible { opacity: 1; }

    .modal-box {
      background: var(--panel-solid);
      border-radius: var(--radius);
      box-shadow: 0 30px 80px rgba(0,0,0,0.18);
      width: 100%;
      max-width: 740px;
      max-height: 90vh;
      display: flex;
      flex-direction: column;
      transform: translateY(16px) scale(0.98);
      transition: transform .22s cubic-bezier(.34,1.56,.64,1);
    }

    .theme-dark .modal-box {
      background: var(--panel-solid);
    }

    .modal-overlay.visible .modal-box {
      transform: translateY(0) scale(1);
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      padding: 22px 24px 18px;
      border-bottom: 1px solid var(--line);
    }

    .modal-header h2 { margin: 0; font-size: 19px; }
    .modal-header p { margin: 5px 0 0; color: var(--muted); font-size: 13px; }

    .modal-close-btn {
      width: 36px;
      height: 36px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.8);
      color: var(--muted);
      font-size: 18px;
      display: grid;
      place-items: center;
      flex: 0 0 auto;
    }

    .theme-dark .modal-close-btn {
      background: rgba(58, 58, 60, 0.8);
      border: 1px solid rgba(84, 84, 86, 0.72);
    }

    .modal-close-btn:hover { background: rgba(255,59,48,0.08); color: var(--danger); border-color: rgba(255,59,48,0.2); }

    .modal-body {
      display: grid;
      grid-template-columns: 1fr 1.1fr;
      flex: 1;
      overflow: hidden;
    }

    .profile-list-panel {
      border-right: 1px solid var(--line);
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .theme-dark .profile-list-panel {
      border-right: 1px solid var(--line);
    }

    .profile-list-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      margin-bottom: 4px;
    }

    .profile-list-head span { font-size: 13px; font-weight: 600; color: var(--muted); }

    .profile-list-item {
      border: 1px solid var(--line);
      border-radius: 16px;
      background: rgba(255,255,255,0.7);
      padding: 12px; /* 移动端增加内边距 */
      display: flex;
      align-items: center;
      gap: 10px;
      text-align: left;
      transition: border-color .15s, background .15s, transform .15s;
      cursor: pointer;
      min-height: 60px; /* 确保触摸面积 */
    }

    .theme-dark .profile-list-item {
      background: rgba(58, 58, 60, 0.7);
      border: 1px solid rgba(84, 84, 86, 0.72);
    }

    .profile-list-item:hover {
      transform: translateY(-1px);
      border-color: rgba(10,132,255,0.22);
    }

    .theme-dark .profile-list-item:hover {
      border-color: rgba(10, 140, 255, 0.22);
    }

    .profile-list-item.active {
      background: var(--primary-soft);
      border-color: rgba(10,132,255,0.3);
    }

    .theme-dark .profile-list-item.active {
      background: var(--primary-soft);
      border-color: rgba(10, 140, 255, 0.3);
    }

    .profile-list-item.builtin .profile-dot { background: var(--primary); }
    .profile-list-item.custom-profile .profile-dot { background: var(--warning); }

    .profile-dot {
      width: 9px;
      height: 9px;
      border-radius: 999px;
      flex: 0 0 auto;
    }

    .profile-item-info { flex: 1; min-width: 0; }
    .profile-item-name { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .profile-item-meta { font-size: 12px; color: var(--muted); margin-top: 2px; }

    .profile-item-badge {
      font-size: 11px;
      padding: 4px 8px;
      border-radius: 999px;
      background: rgba(17,17,17,0.06);
      color: var(--muted);
      flex: 0 0 auto;
    }

    .theme-dark .profile-item-badge {
      background: rgba(255, 255, 255, 0.06);
      color: var(--muted);
    }

    .profile-form-panel {
      overflow-y: auto;
      padding: 18px 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .profile-form-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }

    .profile-form-head h3 { margin: 0; font-size: 16px; }

    .profile-type-indicator {
      font-size: 11px;
      padding: 4px 9px;
      border-radius: 999px;
      background: var(--primary-soft);
      color: var(--primary);
    }

    .profile-type-indicator.custom-profile {
      background: rgba(255,159,10,0.12);
      color: var(--warning);
    }

    .night-window-hint {
      font-size: 12px; /* 移动端字体稍大 */
      color: var(--muted);
      background: rgba(94,92,230,0.07);
      border: 1px solid rgba(94,92,230,0.15);
      border-radius: 12px;
      padding: 10px 12px; /* 移动端增加内边距 */
      line-height: 1.5;
    }

    .theme-dark .night-window-hint {
      background: rgba(94, 92, 230, 0.07);
      border: 1px solid rgba(94, 92, 230, 0.15);
    }

    .profile-form-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      padding-top: 4px;
    }

    .modal-footer {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      padding: 14px 24px;
      border-top: 1px solid var(--line);
    }

    /* ─── Quick-select modal (kept from original) ─── */

    .qs-modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 1000;
      display: none;
      align-items: center;
      justify-content: center;
    }

    .qs-modal-overlay.visible { display: flex; }

    .qs-modal-box {
      background: white;
      padding: 22px 24px;
      border-radius: 18px;
      width: 380px;
      max-width: 90%;
    }

    .theme-dark .qs-modal-box {
      background: var(--panel-solid);
      color: var(--text);
    }

    .qs-modal-box h3 { margin: 0 0 16px; font-size: 17px; }
    .qs-modal-box label { display: block; margin-bottom: 12px; font-size: 14px; cursor: pointer; padding: 8px 0; }
    .qs-modal-box label input { margin-right: 10px; }
    .qs-modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 18px; }

    /* ─── Toast ─────────────────────────────────────── */

    .toast {
      position: fixed;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%) translateY(20px);
      opacity: 0;
      pointer-events: none;
      background: rgba(17,17,17,0.92);
      color: white;
      padding: 12px 14px;
      border-radius: 14px;
      box-shadow: var(--shadow);
      transition: all .2s ease;
      font-size: 14px; /* 移动端字体稍大 */
      max-width: min(90vw, 520px);
      z-index: 9999;
    }

    .theme-dark .toast {
      background: rgba(44, 44, 46, 0.92);
    }

    .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

    button:disabled { opacity: .5; cursor: not-allowed; }

    /* 移动端优化 */
    @media (max-width: 1180px) {
      .summary-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .main-layout { grid-template-columns: 1fr; }
    }

    @media (max-width: 760px) {
      .app { padding: 12px; }
      .topbar { flex-direction: column; align-items: stretch; }
      .topbar-actions { justify-content: stretch; }
      .topbar-actions button { flex: 1 1 auto; }
      .summary-grid { grid-template-columns: 1fr; }
      .calendar-grid, .weekday-row { gap: 6px; }
      .day-cell { min-height: 100px; padding: 6px; }
      .day-num strong { font-size: 14px; }
      .day-total strong { font-size: 13px; }
      .field-grid { grid-template-columns: 1fr; }
      .panel-head, .inspector-head { flex-direction: column; }
      .modal-body { grid-template-columns: 1fr; }
      .profile-list-panel { border-right: none; border-bottom: 1px solid var(--line); max-height: 220px; }
      
      /* 增加触摸目标大小 */
      .day-cell { min-height: 110px; }
      .ghost-btn, .primary-btn { padding: 14px 18px; min-height: 48px; }
      .segment-actions button { padding: 10px 14px; min-height: 44px; }
    }
    
    @media (max-width: 480px) {
      .app { padding: 8px; }
      .topbar { padding: 14px 16px; }
      .calendar-panel { padding: 14px; }
      .panel-card { padding: 14px; }
      .day-cell { min-height: 90px; padding: 5px; }
      .day-num strong { font-size: 13px; }
      .day-total strong { font-size: 12px; }
      .timeline { min-height: 40px; }
      .segment-piece { top: 14px; height: 14px; }
      .segment-tag { font-size: 9px; padding: 3px 6px; }
      .day-footer { font-size: 10px; }
      .stat-card { padding: 14px; }
      .stat-card .value { font-size: 26px; }
      .panel-head h2, .inspector-head h2 { font-size: 17px; }
      .panel-head p, .inspector-head p, .form-hint { font-size: 12px; }
    }
    
    /* 横屏模式优化 */
    @media (max-height: 500px) and (orientation: landscape) {
      .calendar-grid, .weekday-row { gap: 4px; }
      .day-cell { min-height: 80px; padding: 4px; }
      .day-num strong { font-size: 12px; }
      .day-total strong { font-size: 11px; }
      .timeline { min-height: 30px; }
      .segment-piece { top: 10px; height: 12px; }
    }
  </style>
</head>
<body>
<div class="app">
  <header class="topbar">
    <div class="brand">
      <div class="brand-mark">⌁</div>
      <div>
        <h1>月度工作时长统计</h1>
        <p>支持夜班、跨天、加班、碎片化工时与多日期批量添加</p>
      </div>
    </div>

    <div class="topbar-actions">
      <button class="ghost-btn" id="prevMonthBtn" aria-label="上个月">←</button>
      <button class="ghost-btn month-label" id="monthLabel" aria-label="当前月份"></button>
      <button class="ghost-btn" id="nextMonthBtn" aria-label="下个月">→</button>
      <button class="ghost-btn" id="todayBtn">今天</button>
      <button class="ghost-btn" id="multiSelectBtn">多选日期</button>
      <button class="ghost-btn" id="quickSelectBtn">快捷选择</button>
      <button class="ghost-btn" id="batchDeleteBtn">批量删除</button>
      <button class="ghost-btn" id="profileManagerBtn">⚙ 工种管理</button>
      <button class="ghost-btn" id="themeToggleBtn">🎨 主题</button>
      <button class="ghost-btn" id="exportJsonBtn">导出 JSON</button>
      <button class="ghost-btn" id="exportCsvBtn">导出 CSV</button>
    </div>
  </header>

  <section class="summary-grid" id="summaryGrid"></section>

  <main class="main-layout">
    <section class="calendar-panel">
      <div class="panel-head">
        <div>
          <h2>月视图</h2>
          <p>点击日期查看与编辑，开启多选后可一次性给多个日期添加时间段</p>
        </div>
        <div class="legend">
          <span><i class="dot normal"></i>正常</span>
          <span><i class="dot overtime"></i>加班</span>
          <span><i class="dot night"></i>夜班</span>
          <span><i class="dot custom"></i>自定义</span>
        </div>
      </div>

      <div class="weekday-row" id="weekdayRow"></div>
      <div class="calendar-grid" id="calendarGrid"></div>
    </section>

    <aside class="side-panel">
      <section class="panel-card inspector-card">
        <div class="inspector-head">
          <div>
            <h2 id="inspectorTitle">请选择日期</h2>
            <p id="inspectorMeta">单击某一天查看该日的时间段</p>
          </div>
          <div class="selection-badge" id="selectionBadge">0 选中</div>
        </div>

        <div id="selectedDatesChips" class="chips"></div>
        <div id="daySegments" class="segments-list"></div>

        <div class="form-divider"></div>

        <form id="segmentForm" class="segment-form">
          <input type="hidden" name="segmentId" />

          <label class="field">
            <span>工种模板</span>
            <select name="profileId" id="profileSelect"></select>
          </label>

          <div class="field-grid">
            <label class="field"><span>开始</span><input type="time" name="start" required /></label>
            <label class="field"><span>结束</span><input type="time" name="end" required /></label>
          </div>

          <label class="field">
            <span>类型</span>
            <select name="segmentType">
              <option value="normal">正常</option>
              <option value="overtime">加班</option>
              <option value="night">夜班</option>
              <option value="custom">自定义</option>
            </select>
          </label>

          <label class="field">
            <span>备注</span>
            <input type="text" name="note" placeholder="可选" />
          </label>

          <div class="form-actions">
            <button type="submit" class="primary-btn" id="submitBtn">添加时间段</button>
            <button type="button" class="ghost-btn" id="cancelEditBtn" hidden>取消编辑</button>
          </div>

          <p class="form-hint" id="formHint">
            当前会优先应用到已选日期；未开启多选时，作用于当前日期。
          </p>
        </form>
      </section>
    </aside>
  </main>
</div>

<!-- ─── 工种管理 Modal ─────────────────────────── -->
<div class="modal-overlay" id="profileModal" aria-modal="true" role="dialog" aria-label="工种管理">
  <div class="modal-box">
    <div class="modal-header">
      <div>
        <h2>工种管理</h2>
        <p>新增、编辑或删除工种配置文件；内置工种可编辑但不可删除</p>
      </div>
      <button class="modal-close-btn" id="profileModalCloseBtn" aria-label="关闭">×</button>
    </div>

    <div class="modal-body">
      <!-- 左侧：工种列表 -->
      <div class="profile-list-panel">
        <div class="profile-list-head">
          <span>工种列表</span>
          <button class="primary-btn" id="addProfileBtn" style="padding:6px 12px; font-size:12px; border-radius:10px;">+ 新增</button>
        </div>
        <div id="profileListItems"></div>
      </div>

      <!-- 右侧：工种编辑表单 -->
      <div class="profile-form-panel">
        <div class="profile-form-head">
          <h3 id="profileFormTitle">选择工种</h3>
          <span class="profile-type-indicator" id="profileTypeIndicator" hidden>自定义</span>
        </div>

        <form id="profileEditForm" class="segment-form">
          <input type="hidden" name="profileEditId" />

          <label class="field">
            <span>工种名称 <span style="color:var(--danger)">*</span></span>
            <input type="text" name="profileName" placeholder="例：早班 08:00-16:00" required maxlength="40" />
          </label>

          <div class="field-grid">
            <label class="field">
              <span>预设开始时间</span>
              <input type="time" name="profileStart" />
            </label>
            <label class="field">
              <span>预设结束时间</span>
              <input type="time" name="profileEnd" />
            </label>
          </div>

          <label class="field">
            <span>默认类型</span>
            <select name="profileDefaultType">
              <option value="normal">正常</option>
              <option value="overtime">加班</option>
              <option value="night">夜班</option>
              <option value="custom">自定义</option>
            </select>
          </label>

          <label class="field">
            <span>预期工时（分钟，用于计算加班）</span>
            <input type="number" name="profileExpected" min="0" max="1440" placeholder="例：480" />
          </label>

          <div class="night-window-hint">
            🌙 <strong>夜班计算窗口</strong><br/>
            设定"夜间"起止时刻，统计页将自动累计落在此区间内的工时为夜班时长。
          </div>

          <div class="field-grid">
            <label class="field">
              <span>夜班窗口开始</span>
              <input type="time" name="profileNightStart" />
            </label>
            <label class="field">
              <span>夜班窗口结束</span>
              <input type="time" name="profileNightEnd" />
            </label>
          </div>

          <div class="profile-form-actions">
            <button type="submit" class="primary-btn" id="profileSaveBtn">保存工种</button>
            <button type="button" class="ghost-btn" id="profileResetBtn">重置</button>
            <button type="button" class="danger-btn" id="profileDeleteBtn" hidden>删除工种</button>
          </div>
        </form>

        <p id="profileFormHint" class="form-hint" style="margin-top:4px;">
          请在左侧选择一个工种进行编辑，或点击「+ 新增」创建新的工种。
        </p>
      </div>
    </div>

    <div class="modal-footer">
      <button class="ghost-btn" id="profileModalDoneBtn">完成</button>
    </div>
  </div>
</div>

<!-- ─── 主题选择 Modal ─────────────────────────── -->
<div class="qs-modal-overlay" id="themeModal">
  <div class="qs-modal-box">
    <h3>选择主题</h3>
    <label><input type="radio" name="themeSelect" value="default" checked> 默认主题</label>
    <label><input type="radio" name="themeSelect" value="dark"> 深色主题</label>
    <label><input type="radio" name="themeSelect" value="blue"> 蓝色主题</label>
    <label><input type="radio" name="themeSelect" value="purple"> 紫色主题</label>
    <div class="qs-modal-actions">
      <button class="ghost-btn" id="cancelThemeBtn">取消</button>
      <button class="primary-btn" id="applyThemeBtn">应用</button>
    </div>
  </div>
</div>

<!-- ─── 快捷选择 Modal ─────────────────────────── -->
<div class="qs-modal-overlay" id="quickSelectModal">
  <div class="qs-modal-box">
    <h3>快捷选择日期</h3>
    <label><input type="radio" name="quickSelectType" value="week" checked> 本周</label>
    <label><input type="radio" name="quickSelectType" value="lastWeek"> 上周</label>
    <label><input type="radio" name="quickSelectType" value="workdays"> 工作日</label>
    <label><input type="radio" name="quickSelectType" value="weekends"> 周末</label>
    <label><input type="radio" name="quickSelectType" value="all"> 本月全部</label>
    <div class="qs-modal-actions">
      <button class="ghost-btn" id="cancelQuickSelectBtn">取消</button>
      <button class="primary-btn" id="applyQuickSelectBtn">确定</button>
    </div>
  </div>
</div>

<div class="toast" id="toast" aria-live="polite"></div>

<script>
/* ═══════════════════════════════════════════════════════
   月度工作时长统计 — 含工种配置文件管理
═══════════════════════════════════════════════════════ */

const STORAGE_KEY = "monthly-work-hours-v1";

const BUILTIN_IDS = ["day-shift","night-shift","half-day","overtime","custom"];

const DEFAULT_PROFILES = [
  { id:"day-shift",   name:"白班",  expectedMinutes:480, nightStart:1320, nightEnd:360, presetStart:"09:00", presetEnd:"17:00", defaultType:"normal"   },
  { id:"night-shift", name:"夜班",  expectedMinutes:720, nightStart:1320, nightEnd:360, presetStart:"20:00", presetEnd:"08:00", defaultType:"night"    },
  { id:"half-day",    name:"半天班", expectedMinutes:240, nightStart:1320, nightEnd:360, presetStart:"09:00", presetEnd:"13:00", defaultType:"normal"   },
  { id:"overtime",    name:"加班",  expectedMinutes:240, nightStart:1320, nightEnd:360, presetStart:"18:00", presetEnd:"22:00", defaultType:"overtime" },
  { id:"custom",      name:"自定义",             expectedMinutes:0,   nightStart:1320, nightEnd:360, presetStart:"09:00", presetEnd:"18:00", defaultType:"custom"   }
];

const WEEKDAYS = ["一","二","三","四","五","六","日"];

const state = {
  currentMonth: formatMonthKey(new Date()),
  selectedDate: toDateKey(new Date()),
  selectedDates: new Set(),
  multiSelectMode: false,
  editing: null,
  data: null,
  theme: "default",
  profileModal: {
    open: false,
    editingId: null,   // null = creating new
    isNew: false
  }
};

const els = {
  monthLabel:            document.getElementById("monthLabel"),
  prevMonthBtn:          document.getElementById("prevMonthBtn"),
  nextMonthBtn:          document.getElementById("nextMonthBtn"),
  todayBtn:              document.getElementById("todayBtn"),
  multiSelectBtn:        document.getElementById("multiSelectBtn"),
  quickSelectBtn:        document.getElementById("quickSelectBtn"),
  batchDeleteBtn:        document.getElementById("batchDeleteBtn"),
  exportJsonBtn:         document.getElementById("exportJsonBtn"),
  exportCsvBtn:          document.getElementById("exportCsvBtn"),
  profileManagerBtn:     document.getElementById("profileManagerBtn"),
  themeToggleBtn:        document.getElementById("themeToggleBtn"),
  weekdayRow:            document.getElementById("weekdayRow"),
  calendarGrid:          document.getElementById("calendarGrid"),
  summaryGrid:           document.getElementById("summaryGrid"),
  inspectorTitle:        document.getElementById("inspectorTitle"),
  inspectorMeta:         document.getElementById("inspectorMeta"),
  selectionBadge:        document.getElementById("selectionBadge"),
  selectedDatesChips:    document.getElementById("selectedDatesChips"),
  daySegments:           document.getElementById("daySegments"),
  segmentForm:           document.getElementById("segmentForm"),
  profileSelect:         document.getElementById("profileSelect"),
  submitBtn:             document.getElementById("submitBtn"),
  cancelEditBtn:         document.getElementById("cancelEditBtn"),
  formHint:              document.getElementById("formHint"),
  toast:                 document.getElementById("toast"),
  quickSelectModal:      document.getElementById("quickSelectModal"),
  cancelQuickSelectBtn:  document.getElementById("cancelQuickSelectBtn"),
  applyQuickSelectBtn:   document.getElementById("applyQuickSelectBtn"),
  themeModal:            document.getElementById("themeModal"),
  cancelThemeBtn:        document.getElementById("cancelThemeBtn"),
  applyThemeBtn:         document.getElementById("applyThemeBtn"),
  // profile modal
  profileModal:          document.getElementById("profileModal"),
  profileModalCloseBtn:  document.getElementById("profileModalCloseBtn"),
  profileModalDoneBtn:   document.getElementById("profileModalDoneBtn"),
  addProfileBtn:         document.getElementById("addProfileBtn"),
  profileListItems:      document.getElementById("profileListItems"),
  profileEditForm:       document.getElementById("profileEditForm"),
  profileFormTitle:      document.getElementById("profileFormTitle"),
  profileTypeIndicator:  document.getElementById("profileTypeIndicator"),
  profileSaveBtn:        document.getElementById("profileSaveBtn"),
  profileResetBtn:       document.getElementById("profileResetBtn"),
  profileDeleteBtn:      document.getElementById("profileDeleteBtn"),
  profileFormHint:       document.getElementById("profileFormHint")
};

init();

/* ─── INIT ─────────────────────────────────────── */

function init() {
  state.data = loadData();
  state.theme = loadTheme();
  applyTheme(state.theme);
  ensureMonth(state.currentMonth);
  renderWeekdays();
  renderProfileOptions();
  bindEvents();
  syncFormDefaults();
  render();
}

/* ─── THEME MANAGEMENT ────────────────────────────── */

function loadTheme() {
  return localStorage.getItem("work-hours-theme") || "default";
}

function saveTheme(theme) {
  localStorage.setItem("work-hours-theme", theme);
}

function applyTheme(theme) {
  document.documentElement.className = theme === "default" ? "" : `theme-${theme}`;
  state.theme = theme;
  saveTheme(theme);
}

function toggleTheme() {
  const themes = ["default", "dark", "blue", "purple"];
  const currentIndex = themes.indexOf(state.theme);
  const nextIndex = (currentIndex + 1) % themes.length;
  applyTheme(themes[nextIndex]);
  showToast(`已切换到${themes[nextIndex] === "default" ? "默认" : themes[nextIndex]}主题`);
}

/* ─── EVENT BINDING ────────────────────────────── */

function bindEvents() {
  els.prevMonthBtn.addEventListener("click", () => { state.currentMonth = shiftMonth(state.currentMonth,-1); onMonthChanged(); });
  els.nextMonthBtn.addEventListener("click", () => { state.currentMonth = shiftMonth(state.currentMonth, 1); onMonthChanged(); });

  els.todayBtn.addEventListener("click", () => {
    const todayKey = toDateKey(new Date());
    state.currentMonth = formatMonthKey(new Date());
    state.selectedDate = todayKey;  // 设置为今天的日期
    state.selectedDates.clear();
    state.multiSelectMode = false;
    onMonthChanged(true, todayKey);  // 传入今天的真实日期
    showToast("已切换到今天");
  });

  els.multiSelectBtn.addEventListener("click", () => {
    state.multiSelectMode = !state.multiSelectMode;
    if (!state.multiSelectMode) state.selectedDates.clear();
    updateMultiSelectButton();
    render();
    showToast(state.multiSelectMode ? "已开启多选日期" : "已关闭多选日期");
  });

  els.quickSelectBtn.addEventListener("click", () => {
    if (!state.multiSelectMode) {
      state.multiSelectMode = true;
      updateMultiSelectButton();
      render();
      showToast("已开启多选日期");
    }
    els.quickSelectModal.classList.add("visible");
  });

  els.cancelQuickSelectBtn.addEventListener("click", () => els.quickSelectModal.classList.remove("visible"));
  els.quickSelectModal.addEventListener("click", e => { if (e.target === els.quickSelectModal) els.quickSelectModal.classList.remove("visible"); });

  els.applyQuickSelectBtn.addEventListener("click", () => {
    const opt = document.querySelector('input[name="quickSelectType"]:checked');
    if (opt) { quickSelectDates(opt.value); els.quickSelectModal.classList.remove("visible"); }
  });

  els.batchDeleteBtn.addEventListener("click", () => {
    if (!state.multiSelectMode) {
      state.multiSelectMode = true;
      updateMultiSelectButton();
      render();
      showToast("已开启多选日期");
    }
    if (!state.selectedDates.size) { showToast("请先选择要删除的日期"); return; }
    if (!confirm(`确认删除 ${state.selectedDates.size} 个日期的所有时间 package？`)) return;
    let n = 0;
    for (const dk of state.selectedDates) {
      const m = getMonthData(monthKeyFromDateKey(dk));
      if (m.days[dk]) { n += m.days[dk].segments.length; m.days[dk].segments = []; }
    }
    saveData(state.data);
    render();
    showToast(`已删除 ${n} 个时间 package`);
  });

  els.exportJsonBtn.addEventListener("click", exportJSON);
  els.exportCsvBtn.addEventListener("click", exportCSV);

  /* Theme management */
  els.themeToggleBtn.addEventListener("click", () => {
    els.themeModal.querySelector(`input[value="${state.theme}"]`).checked = true;
    els.themeModal.classList.add("visible");
  });

  els.cancelThemeBtn.addEventListener("click", () => els.themeModal.classList.remove("visible"));
  els.themeModal.addEventListener("click", e => { if (e.target === els.themeModal) els.themeModal.classList.remove("visible"); });

  els.applyThemeBtn.addEventListener("click", () => {
    const selectedTheme = document.querySelector('input[name="themeSelect"]:checked').value;
    applyTheme(selectedTheme);
    els.themeModal.classList.remove("visible");
    showToast(`已应用${selectedTheme === "default" ? "默认" : selectedTheme}主题`);
  });

  /* Profile manager open/close */
  els.profileManagerBtn.addEventListener("click", openProfileModal);
  els.profileModalCloseBtn.addEventListener("click", closeProfileModal);
  els.profileModalDoneBtn.addEventListener("click", closeProfileModal);
  els.profileModal.addEventListener("click", e => { if (e.target === els.profileModal) closeProfileModal(); });

  /* Profile list: new */
  els.addProfileBtn.addEventListener("click", () => startNewProfile());

  /* Profile list: click to select */
  els.profileListItems.addEventListener("click", e => {
    const item = e.target.closest("[data-profile-id]");
    if (!item) return;
    selectProfileForEdit(item.dataset.profileId);
  });

  /* Profile form: save */
  els.profileEditForm.addEventListener("submit", handleProfileFormSubmit);

  /* Profile form: reset */
  els.profileResetBtn.addEventListener("click", () => {
    if (state.profileModal.editingId) selectProfileForEdit(state.profileModal.editingId);
    else startNewProfile();
  });

  /* Profile form: delete */
  els.profileDeleteBtn.addEventListener("click", () => {
    const pid = state.profileModal.editingId;
    if (!pid) return;
    if (isBuiltin(pid)) { showToast("内置工种不可删除"); return; }
    if (!confirm(`确认删除工种「${getProfileById(pid)?.name || pid}」？\n已使用该工种的历史记录将保留，但无法再选用此工种。`)) return;
    deleteProfile(pid);
  });

  /* Segment form profile change */
  els.profileSelect.addEventListener("change", () => {
    const profile = getProfileById(els.profileSelect.value);
    if (!profile || state.editing) return;
    els.segmentForm.elements.start.value = profile.presetStart;
    els.segmentForm.elements.end.value = profile.presetEnd;
    els.segmentForm.elements.segmentType.value = profile.defaultType;
  });

  els.cancelEditBtn.addEventListener("click", () => {
    state.editing = null;
    syncFormDefaults();
    renderInspector();
    showToast("已取消编辑");
  });

  els.segmentForm.addEventListener("submit", handleFormSubmit);

  els.calendarGrid.addEventListener("click", e => {
    const cell = e.target.closest("[data-date]");
    if (!cell) return;
    const dk = cell.dataset.date;
    if (state.multiSelectMode) {
      if (state.selectedDates.has(dk)) state.selectedDates.delete(dk);
      else state.selectedDates.add(dk);
      state.selectedDate = dk;
      render(); return;
    }
    state.selectedDate = dk;
    state.selectedDates.clear();
    render();
  });

  els.daySegments.addEventListener("click", e => {
    const btn = e.target.closest("button[data-action]");
    if (!btn) return;
    const { action, date, segmentId } = btn.dataset;
    if (action === "edit") startEdit(date, segmentId);
    if (action === "delete" && confirm("确认删除这个时间 package？")) {
      deleteSegment(date, segmentId);
      showToast("已删除");
    }
  });
}

/* ─── PROFILE MODAL ────────────────────────────── */

function openProfileModal() {
  state.profileModal.editingId = null;
  state.profileModal.isNew = false;
  renderProfileList();
  resetProfileForm();
  els.profileModal.style.display = "flex";
  requestAnimationFrame(() => els.profileModal.classList.add("visible"));
}

function closeProfileModal() {
  els.profileModal.classList.remove("visible");
  setTimeout(() => { els.profileModal.style.display = "none"; }, 220);
  // Refresh main UI profile dropdown
  renderProfileOptions();
  render();
}

function renderProfileList() {
  const profiles = state.data.profiles;
  els.profileListItems.innerHTML = profiles.map(p => {
    const isBuiltIn = isBuiltin(p.id);
    const active = p.id === state.profileModal.editingId ? "active" : "";
    const cls = isBuiltIn ? "builtin" : "custom-profile";
    return `
      <button class="profile-list-item ${cls} ${active}" data-profile-id="${p.id}" type="button">
        <span class="profile-dot" style="background:${profileColor(p.defaultType)}"></span>
        <div class="profile-item-info">
          <div class="profile-item-name">${escapeHTML(p.name)}</div>
          <div class="profile-item-meta">${p.presetStart} → ${p.presetEnd} · ${formatHours(p.expectedMinutes)}</div>
        </div>
        <span class="profile-item-badge">${isBuiltIn ? "内置" : "自定义"}</span>
      </button>`;
  }).join("");
}

function selectProfileForEdit(profileId) {
  const p = getProfileById(profileId);
  if (!p) return;
  state.profileModal.editingId = profileId;
  state.profileModal.isNew = false;

  const form = els.profileEditForm;
  form.elements.profileEditId.value = p.id;
  form.elements.profileName.value = p.name;
  form.elements.profileStart.value = p.presetStart;
  form.elements.profileEnd.value = p.presetEnd;
  form.elements.profileDefaultType.value = p.defaultType;
  form.elements.profileExpected.value = p.expectedMinutes;
  form.elements.profileNightStart.value = minuteToTime(p.nightStart);
  form.elements.profileNightEnd.value = minuteToTime(p.nightEnd);

  const builtIn = isBuiltin(profileId);
  els.profileFormTitle.textContent = escapeHTML(p.name);
  els.profileTypeIndicator.textContent = builtIn ? "内置工种" : "自定义工种";
  els.profileTypeIndicator.className = `profile-type-indicator${builtIn ? "" : " custom-profile"}`;
  els.profileTypeIndicator.hidden = false;
  els.profileDeleteBtn.hidden = builtIn;
  els.profileSaveBtn.textContent = "保存修改";
  els.profileFormHint.textContent = builtIn
    ? "内置工种可以修改时间和参数，但无法删除。修改后将立即生效。"
    : "修改后点击「保存修改」，历史记录不受影响。";

  renderProfileList();
}

function startNewProfile() {
  state.profileModal.editingId = null;
  state.profileModal.isNew = true;
  resetProfileForm();
  els.profileFormTitle.textContent = "新工种";
  els.profileTypeIndicator.textContent = "新建";
  els.profileTypeIndicator.className = "profile-type-indicator custom-profile";
  els.profileTypeIndicator.hidden = false;
  els.profileDeleteBtn.hidden = true;
  els.profileSaveBtn.textContent = "创建工种";
  els.profileFormHint.textContent = "填写新工种的名称和时间参数后，点击「创建工种」保存。";
  renderProfileList();
}

function resetProfileForm() {
  const form = els.profileEditForm;
  form.reset();
  form.elements.profileEditId.value = "";
  form.elements.profileStart.value = "09:00";
  form.elements.profileEnd.value = "18:00";
  form.elements.profileDefaultType.value = "normal";
  form.elements.profileExpected.value = "480";
  form.elements.profileNightStart.value = "22:00";
  form.elements.profileNightEnd.value = "06:00";
  els.profileFormTitle.textContent = "选择工种";
  els.profileTypeIndicator.hidden = true;
  els.profileDeleteBtn.hidden = true;
  els.profileSaveBtn.textContent = "保存工种";
  els.profileFormHint.textContent = "请在左侧选择一个工种进行编辑，或点击「+ 新增」创建新的工种。";
}

function handleProfileFormSubmit(e) {
  e.preventDefault();
  const fd = new FormData(els.profileEditForm);

  const name         = String(fd.get("profileName") || "").trim();
  const presetStart  = String(fd.get("profileStart") || "09:00");
  const presetEnd    = String(fd.get("profileEnd")   || "18:00");
  const defaultType  = String(fd.get("profileDefaultType") || "normal");
  const expectedMin  = Math.max(0, parseInt(fd.get("profileExpected") || "0", 10) || 0);
  const nightStart   = parseTimeToMinute(String(fd.get("profileNightStart") || "22:00"));
  const nightEnd     = parseTimeToMinute(String(fd.get("profileNightEnd")   || "06:00"));

  if (!name) { showToast("工种名称不能为空"); return; }

  if (state.profileModal.isNew) {
    // Create
    const newProfile = {
      id: `custom-${cryptoId().slice(0,8)}`,
      name,
      expectedMinutes: expectedMin,
      nightStart: isNaN(nightStart) ? 1320 : nightStart,
      nightEnd:   isNaN(nightEnd)   ? 360  : nightEnd,
      presetStart,
      presetEnd,
      defaultType
    };
    state.data.profiles.push(newProfile);
    state.profileModal.editingId = newProfile.id;
    state.profileModal.isNew = false;
    saveData(state.data);
    renderProfileList();
    selectProfileForEdit(newProfile.id);
    showToast(`工种「${name}」已创建`);
  } else {
    // Update
    const pid = state.profileModal.editingId;
    if (!pid) { showToast("未选中工种"); return; }
    const idx = state.data.profiles.findIndex(p => p.id === pid);
    if (idx === -1) { showToast("工种不存在"); return; }
    state.data.profiles[idx] = {
      ...state.data.profiles[idx],
      name,
      expectedMinutes: expectedMin,
      nightStart: isNaN(nightStart) ? 1320 : nightStart,
      nightEnd:   isNaN(nightEnd)   ? 360  : nightEnd,
      presetStart,
      presetEnd,
      defaultType
    };
    saveData(state.data);
    renderProfileList();
    els.profileFormTitle.textContent = escapeHTML(name);
    showToast(`工种「${name}」已更新`);
  }
}

function deleteProfile(profileId) {
  if (isBuiltin(profileId)) { showToast("内置工种不可删除"); return; }
  const name = getProfileById(profileId)?.name || profileId;
  state.data.profiles = state.data.profiles.filter(p => p.id !== profileId);
  saveData(state.data);
  state.profileModal.editingId = null;
  state.profileModal.isNew = false;
  renderProfileList();
  resetProfileForm();
  showToast(`工种「${name}」已删除`);
}

function profileColor(type) {
  switch(type) {
    case "normal":   return "var(--normal)";
    case "overtime": return "var(--overtime)";
    case "night":    return "var(--night)";
    default:         return "var(--custom)";
  }
}

function isBuiltin(profileId) {
  return BUILTIN_IDS.includes(profileId);
}

/* ─── MONTH ────────────────────────────────────── */

function onMonthChanged(resetSelection = false, forceSelectedDate = null) {
  ensureMonth(state.currentMonth);
  const days = getDaysInMonth(state.currentMonth);
  if (resetSelection) {
    // 如果提供了强制选择的日期并且在当前月份中存在，则使用该日期
    if (forceSelectedDate && days.includes(forceSelectedDate)) {
      state.selectedDate = forceSelectedDate;
    } else {
      // 否则使用第一个日期
      state.selectedDate = days[0] || state.selectedDate;
    }
    state.selectedDates.clear();
    state.multiSelectMode = false;
  } else {
    if (!days.includes(state.selectedDate)) state.selectedDate = days[0] || state.selectedDate;
    if (state.selectedDates.size) state.selectedDates = new Set([...state.selectedDates].filter(d => d.startsWith(state.currentMonth)));
  }
  updateMultiSelectButton();
  syncFormDefaults();
  render();
}

  els.monthLabel.textContent = formatMonthLabel(state.currentMonth);

  renderSummary();

}

  const cards = [
    { label:"总工时",   value:formatHours(s.totalMinutes),    sub:`${s.dayCount} 天有记录` },
    { label:"正常工时", value:formatHours(s.normalMinutes),   sub:"按模板预期值计算" },
    { label:"加班工时", value:formatHours(s.overtimeMinutes), sub:"超出模板时长的部分" },
    { label:"夜班工时", value:formatHours(s.nightMinutes),    sub:"按夜间窗口自动统计" },

function renderCalendar() {
  const month = getMonthData(state.currentMonth);
  const days = buildMonthGrid(state.currentMonth);

  els.calendarGrid.innerHTML = days.map(day => {
    if (!day.dateKey) return `<div class="day-cell empty" aria-hidden="true"></div>`;

    const dayData = month.days[day.dateKey] || { segments:[] };
    const isToday = day.dateKey === toDateKey(new Date());
    const isSelected = day.dateKey === state.selectedDate;
    const isMulti = state.selectedDates.has(day.dateKey);
    const hasConflict = checkDayConflict(dayData.segments);
    const isWeekend = isWeekendDay(day.dateKey);

    const totalMinutes = dayData.segments.reduce((s,seg) => s + getSegmentDuration(seg), 0);
    const totalText = totalMinutes > 0 ? formatHours(totalMinutes) : "—";
    const segCount = dayData.segments.length;

    const pieces = dayData.segments.flatMap(seg => renderSegmentPieces(seg, checkSegmentConflict(dayData.segments, seg.id)));
    const tags = dayData.segments.slice(0,2).map(seg => {
      const p = getProfileById(seg.profileId);
      return `<span class="segment-tag">${escapeHTML(p?.name || seg.profileId)} · ${formatRange(seg.startMinute, seg.endMinute)}</span>`;
    });

    return `
      <button class="day-cell ${isToday?"today":""} ${isSelected?"selected":""} ${isMulti?"multiselected":""} ${hasConflict?"conflict":""} ${isWeekend?"weekend":""}" data-date="${day.dateKey}">
        <div class="day-top">
          <div class="day-num"><strong>${day.dayNumber}</strong><small>${day.weekday}</small></div>
          <div class="day-total"><strong>${totalText}</strong><small>${segCount ? `${segCount} 个 package` : "无记录"}</small></div>
        </div>
        <div class="timeline" aria-hidden="true">${pieces.join("")}</div>
        <div class="segment-tags">${tags.join("")}</div>
        <div class="day-footer"><span>${day.isCurrentMonth ? day.dateKey : ""}</span><span>${isToday ? "今天" : ""}</span></div>
        ${hasConflict ? '<div class="conflict-warning">⚠ 时间冲突</div>' : ''}
      </button>`;
  }).join("");
}

  const month = getMonthData(state.currentMonth);
  const dayData = month.days[state.selectedDate] || { segments:[] };
  const selectedCount = state.multiSelectMode ? state.selectedDates.size : 0;

  const segments = dayData.segments || [];
  const totalMinutes = segments.reduce((s,seg) => s + getSegmentDuration(seg), 0);

  els.inspectorMeta.textContent = segments.length

  if (!segments.length) {
    els.daySegments.innerHTML = `
      <div class="segment-item">
        <div class="title">空状态</div>
        <div class="meta">当前日期没有任何时间 package。你可以在下方直接新增，或者开启多选后一次性应用到多个日期。</div>
      </div>`;
  } else {
    els.daySegments.innerHTML = segments.map(seg => {
      const profile = getProfileById(seg.profileId);
      const duration = getSegmentDuration(seg);
      const isConflict = checkSegmentConflict(segments, seg.id);
      return `
        <div class="segment-item ${isConflict ? "conflict" : ""}">
          <div class="row">
            <div>
              <div class="title">${escapeHTML(profile?.name || seg.profileId)} · ${formatRange(seg.startMinute, seg.endMinute)}</div>
              <div class="meta">
                类型：${labelSegmentType(seg.segmentType)} · 时长：${formatHours(duration)}<br/>
                ${seg.note ? `备注：${escapeHTML(seg.note)}<br/>` : ""}
                工种ID：${escapeHTML(seg.profileId)}
                ${isConflict ? '<br/><span style="color:var(--danger);font-weight:bold;">⚠ 时间冲突</span>' : ""}
              </div>
            </div>
            <div class="segment-actions">

            </div>

    }).join("");
  }

  if (state.editing) {
    els.submitBtn.textContent = "保存修改";
    els.cancelEditBtn.hidden = false;
    els.formHint.textContent = `正在编辑 ${state.editing.dateKey} 的一个 package。保存后会同步更新本地数据。`;
  } else {
    els.submitBtn.textContent = state.multiSelectMode && state.selectedDates.size > 1
      ? `批量添加到 ${state.selectedDates.size} 天`
      : "添加时间 package";
    els.cancelEditBtn.hidden = true;
    els.formHint.textContent = state.multiSelectMode && state.selectedDates.size > 1
      ? `将添加到当前选中的 ${state.selectedDates.size} 个日期。`
      : "当前会优先应用到已选日期；未开启多选时，作用于当前日期。";
  }
}

/* ─── CONFLICT DETECTION ───────────────────────── */

function checkDayConflict(segments) {
  if (!segments || segments.length < 2) return false;
  for (let i = 0; i < segments.length; i++)
    for (let j = i+1; j < segments.length; j++)
      if (checkTimeConflict(segments[i], segments[j])) return true;
  return false;
}

function checkTimeConflict(seg1, seg2) {
  const {startMinute:s1, endMinute:e1} = seg1;
  const {startMinute:s2, endMinute:e2} = seg2;
  if (e1 > 1440 || e2 > 1440) {
    if (e1 > 1440) return checkSimpleConflict(s1,1440,s2,e2) || checkSimpleConflict(0,e1-1440,s2,e2);
    if (e2 > 1440) return checkSimpleConflict(s1,e1,s2,1440) || checkSimpleConflict(s1,e1,0,e2-1440);
  }
  return checkSimpleConflict(s1,e1,s2,e2);
}

function checkSimpleConflict(s1,e1,s2,e2) { return s1 < e2 && s2 < e1; }

function checkSegmentConflict(segments, segId) {
  if (!segments || segments.length < 2) return false;
  const target = segments.find(s => s.id === segId);
  if (!target) return false;
  return segments.some(s => s.id !== segId && checkTimeConflict(target, s));
}


function dateKeyToLocalDate(dateKey) {
  const [y, m, d] = dateKey.split("-").map(Number);
  return new Date(y, m - 1, d);
}

function addDaysToDateKey(dateKey, days) {
  const date = dateKeyToLocalDate(dateKey);
  date.setDate(date.getDate() + days);
  return toDateKey(date);
}

function diffDays(dateKeyA, dateKeyB) {
  const a = dateKeyToLocalDate(dateKeyA);
  const b = dateKeyToLocalDate(dateKeyB);
  return Math.round((b - a) / 86400000);
}

function normalizeLogicalEnd(startMinute, endMinute) {
  return endMinute <= startMinute ? endMinute + 1440 : endMinute;
}

function buildStoredSegmentsByDate(targetDates, segmentInput) {
  const grouped = new Map();

  for (const dateKey of targetDates) {
    const logicalEnd = normalizeLogicalEnd(segmentInput.startMinute, segmentInput.endMinute);
    const groupId = cryptoId();
    const totalSpanParts = Math.max(1, Math.ceil((logicalEnd - segmentInput.startMinute) / 1440));

    let cursor = segmentInput.startMinute;
    let spanIndex = 0;

    while (cursor < logicalEnd) {
      const dayOffset = Math.floor(cursor / 1440);
      const nextBoundary = (dayOffset + 1) * 1440;
      const partAbsEnd = Math.min(logicalEnd, nextBoundary);

      const partStart = cursor % 1440;
      const partEnd = partAbsEnd % 1440 === 0 ? 1440 : partAbsEnd % 1440;

      const storeDateKey = addDaysToDateKey(dateKey, dayOffset);
      const payload = {
        id: cryptoId(),
        profileId: segmentInput.profileId,
        segmentType: segmentInput.segmentType,
        startMinute: partStart,
        endMinute: partEnd,
        note: segmentInput.note || "",
        groupId,
        spanIndex,
        spanTotal: totalSpanParts,
        createdAt: new Date().toISOString()
      };

      if (!grouped.has(storeDateKey)) grouped.set(storeDateKey, []);
      grouped.get(storeDateKey).push(payload);

      cursor = partAbsEnd;
      spanIndex += 1;
    }
  }

  return grouped;
}

function findSegmentByDateAndId(dateKey, segmentId) {
  const month = getMonthData(monthKeyFromDateKey(dateKey));
  const day = month.days[dateKey];
  if (!day) return null;
  const segment = (day.segments || []).find(s => s.id === segmentId);
  if (!segment) return null;
  return { monthKey: month.month, dateKey, day, segment };
}

function findSegmentsByGroupId(groupId) {
  if (!groupId) return [];
  const result = [];
  for (const [monthKey, month] of Object.entries(state.data.months || {})) {
    for (const [dateKey, day] of Object.entries(month.days || {})) {
      for (const segment of day.segments || []) {
        if (segment.groupId === groupId) {
          result.push({ monthKey, dateKey, day, segment });
        }
      }
    }
  }
  result.sort((a, b) => {
    const byDate = a.dateKey.localeCompare(b.dateKey);
    if (byDate !== 0) return byDate;
    return (a.segment.spanIndex || 0) - (b.segment.spanIndex || 0);
  });
  return result;
}

function getEditableSegmentIds() {
  if (!state.editing) return [];
  const target = findSegmentByDateAndId(state.editing.dateKey, state.editing.segmentId);
  if (!target) return [state.editing.segmentId];
  const { segment } = target;
  if (!segment.groupId) return [segment.id];
  return findSegmentsByGroupId(segment.groupId).map(item => item.segment.id);
}

function removeLinkedSegmentsByEditingTarget() {
  if (!state.editing) return;
  const target = findSegmentByDateAndId(state.editing.dateKey, state.editing.segmentId);
  if (!target) return;

  const { segment } = target;
  if (segment.groupId) {
    for (const item of findSegmentsByGroupId(segment.groupId)) {
      item.day.segments = item.day.segments.filter(s => s.groupId !== segment.groupId);
    }
  } else {
    target.day.segments = target.day.segments.filter(s => s.id !== segment.id);
  }
  saveData(state.data);
}

/* ─── WEEKEND DETECTION ────────────────────────── */

function isWeekendDay(dateKey) {
  const date = new Date(dateKey);
  const dayOfWeek = date.getDay();
  return dayOfWeek === 0 || dayOfWeek === 6; // 0 = Sunday, 6 = Saturday
}

/* ─── SEGMENT FORM ─────────────────────────────── */


function handleFormSubmit(e) {
  e.preventDefault();
  const fd = new FormData(els.segmentForm);
  const profileId    = String(fd.get("profileId") || "custom");
  const profile      = getProfileById(profileId);
  const startRaw     = String(fd.get("start") || "");
  const endRaw       = String(fd.get("end")   || "");
  const segmentType  = String(fd.get("segmentType") || profile?.defaultType || "custom");
  const note         = String(fd.get("note") || "").trim();
  const startMinute  = parseTimeToMinute(startRaw);
  let   endMinute    = parseTimeToMinute(endRaw);

  if (isNaN(startMinute) || isNaN(endMinute)) { showToast("开始时间或结束时间无效"); return; }
  if (startMinute === endMinute) { showToast("开始与结束不能相同"); return; }

  const targetDates = resolveTargetDates();
  if (!targetDates.length) { showToast("没有可应用的日期"); return; }

  const editingIds = getEditableSegmentIds();
  const editingGroupId = state.editing?.groupId || null;
  const plannedByDate = buildStoredSegmentsByDate(targetDates, {
    profileId,
    segmentType,
    startMinute,
    endMinute,
    note
  });

  let conflictFound = false;
  for (const [dateKey, plannedSegments] of plannedByDate.entries()) {
    const m = getMonthData(monthKeyFromDateKey(dateKey));
    const dayData = m.days[dateKey] || { segments:[] };
    const toCheck = (dayData.segments || []).filter(s =>
      !editingIds.includes(s.id) && (!editingGroupId || s.groupId !== editingGroupId)
    );

    for (const planned of plannedSegments) {
      for (const existing of toCheck) {
        if (checkTimeConflict(planned, existing)) {
          conflictFound = true;
          break;
        }
      }
      if (conflictFound) break;
    }
    if (conflictFound) break;
  }

  if (conflictFound && !confirm("检测到时间冲突！是否继续添加？")) return;

  if (state.editing) {
    removeLinkedSegmentsByEditingTarget();
    for (const [dateKey, plannedSegments] of plannedByDate.entries()) {
      for (const seg of plannedSegments) addSegment(dateKey, seg);
    }
    state.editing = null;
    showToast("已保存修改");
  } else {
    for (const [dateKey, plannedSegments] of plannedByDate.entries()) {
      for (const seg of plannedSegments) addSegment(dateKey, seg);
    }
    showToast(targetDates.length > 1 ? `已批量添加到 ${targetDates.length} 天` : "已添加");
  }

  syncFormDefaults();
  render();
}


function resolveTargetDates() {
  if (state.editing) return [state.editing.dateKey];
  if (state.multiSelectMode && state.selectedDates.size) return [...state.selectedDates].sort();
  return state.selectedDate ? [state.selectedDate] : [];
}


function startEdit(dateKey, segmentId) {
  const target = findSegmentByDateAndId(dateKey, segmentId);
  if (!target) return;

  const { segment } = target;
  state.selectedDate = dateKey;
  state.selectedDates.clear();
  state.multiSelectMode = false;

  let startMinute = segment.startMinute;
  let endMinute = segment.endMinute;

  if (segment.groupId) {
    const linked = findSegmentsByGroupId(segment.groupId);
    if (linked.length) {
      const first = linked[0];
      const last = linked[linked.length - 1];
      startMinute = first.segment.startMinute;
      const dayOffset = diffDays(first.dateKey, last.dateKey);
      endMinute = dayOffset * 1440 + last.segment.endMinute;
    }
  }

  state.editing = {
    dateKey,
    segmentId,
    groupId: segment.groupId || null
  };

  els.segmentForm.elements.segmentId.value = segmentId;
  els.segmentForm.elements.profileId.value = segment.profileId;
  els.segmentForm.elements.start.value = minuteToTime(startMinute);
  els.segmentForm.elements.end.value = minuteToTime(endMinute % 1440);
  els.segmentForm.elements.segmentType.value = segment.segmentType || "custom";
  els.segmentForm.elements.note.value = segment.note || "";
  updateMultiSelectButton();
  render();
  showToast("已进入编辑状态");
}

function syncFormDefaults() {
  if (state.editing) return;
  const profile = getProfileById(els.profileSelect.value) || state.data.profiles[0] || DEFAULT_PROFILES[0];
  els.segmentForm.reset();
  els.segmentForm.elements.profileId.value = profile.id;
  els.segmentForm.elements.start.value = profile.presetStart;
  els.segmentForm.elements.end.value = profile.presetEnd;
  els.segmentForm.elements.segmentType.value = profile.defaultType;
  els.segmentForm.elements.note.value = "";
  els.segmentForm.elements.segmentId.value = "";
}

/* ─── DATA OPS ─────────────────────────────────── */


function addSegment(dateKey, segment) {
  const month = getMonthData(monthKeyFromDateKey(dateKey));
  ensureDay(month.month, dateKey);
  month.days[dateKey].segments.push({
    id: segment.id || cryptoId(),
    ...segment,
    note: segment.note || "",
    createdAt: segment.createdAt || new Date().toISOString()
  });
  saveData(state.data);
}

function updateSegment(dateKey, segmentId, updates) {
  const month = getMonthData(monthKeyFromDateKey(dateKey));
  const day = month.days[dateKey];
  if (!day) return;
  const idx = day.segments.findIndex(s => s.id === segmentId);
  if (idx === -1) return;
  day.segments[idx] = { ...day.segments[idx], ...updates, updatedAt:new Date().toISOString() };
  saveData(state.data);
}

function deleteSegment(dateKey, segmentId) {
  const target = findSegmentByDateAndId(dateKey, segmentId);
  if (!target) return;

  const { segment } = target;
  if (segment.groupId) {
    for (const item of findSegmentsByGroupId(segment.groupId)) {
      item.day.segments = item.day.segments.filter(s => s.groupId !== segment.groupId);
    }
  } else {
    target.day.segments = target.day.segments.filter(s => s.id !== segment.id);
  }

  if (state.editing) {
    const editingTarget = findSegmentByDateAndId(state.editing.dateKey, state.editing.segmentId);
    if (!editingTarget || (editingTarget.segment.groupId ? editingTarget.segment.groupId === segment.groupId : editingTarget.segment.id === segment.id)) {
      state.editing = null;
      syncFormDefaults();
    }
  }

  saveData(state.data);
  render();
}

/* ─── STATS ────────────────────────────────────── */

function computeMonthStats(monthKey) {
  const month = getMonthData(monthKey);
  let totalMinutes=0, normalMinutes=0, overtimeMinutes=0, nightMinutes=0, workingDays=0, dayCount=0;
  for (const day of Object.values(month.days)) {
    if (!day.segments?.length) continue;
    dayCount++; workingDays++;
    for (const seg of day.segments) {
      const dur = getSegmentDuration(seg);
      totalMinutes += dur;
      const profile = getProfileById(seg.profileId) || DEFAULT_PROFILES[0];
      const expected = Math.max(0, profile.expectedMinutes || 0);
      normalMinutes   += Math.min(dur, expected);
      overtimeMinutes += Math.max(dur - expected, 0);
      
      // 修复夜班时间计算逻辑
      nightMinutes += computeNightOverlap(seg.startMinute, seg.endMinute, profile.nightStart, profile.nightEnd);
    }
  }
  return { totalMinutes, normalMinutes, overtimeMinutes, nightMinutes, workingDays, dayCount };
}

// 修复夜班时间计算逻辑，使其正确处理跨天情况
function computeNightOverlap(start, end, nightStart=1320, nightEnd=360) {
  let total = 0;
  
  // 如果结束时间大于1440分钟（即跨天），需要分别计算当天和第二天的夜班时间
  if (end > 1440) {
    // 计算当天的夜班时间（从开始时间到24:00）
    const dayStart = start;
    const dayEnd = 1440;
    if (nightStart < nightEnd) {
      // 夜班窗口在同一天内（例如 22:00 到 23:00）
      total += overlap(dayStart, dayEnd, nightStart, nightEnd);
    } else {
      // 夜班窗口跨天（例如 22:00 到 06:00）
      total += overlap(dayStart, dayEnd, nightStart, 1440);
    }
    
    // 计算第二天的夜班时间（从00:00到结束时间-1440）
    const nextDayStart = 0;
    const nextDayEnd = end - 1440;
    if (nightStart < nightEnd) {
      // 夜班窗口在同一天内（例如 22:00 到 23:00）
      total += overlap(nextDayStart, nextDayEnd, nightStart, nightEnd);
    } else {
      // 夜班窗口跨天（例如 00:00 到 06:00）
      if (nightStart > 1440) {
        // 如果夜班开始时间也跨天，需要调整为第二天的时间
        total += overlap(nextDayStart, nextDayEnd, nightStart - 1440, 1440);
      } else {
        total += overlap(nextDayStart, nextDayEnd, 0, nightEnd);
      }
    }
  } else {
    // 不跨天的情况
    if (nightStart < nightEnd) {
      total += overlap(start, end, nightStart, nightEnd);
    } else {
      // 夜班窗口跨天（例如 22:00 到 06:00）
      total += overlap(start, end, nightStart, 1440);
      total += overlap(start, end, 0, nightEnd);
    }
  }
  
  return total;
}

function overlap(aS,aE,bS,bE) { 
  // 正确计算时间重叠
  const actualStart = Math.max(aS, bS);
  const actualEnd = Math.min(aE, bE);
  return Math.max(0, actualEnd - actualStart);
}

function getSegmentDuration(seg) { 
  // 修复持续时间计算，考虑跨天情况
  if (seg.endMinute > 1440) {
    return seg.endMinute - seg.startMinute - 1440; // 减去24小时的重复计算
  }
  return Math.max(0, seg.endMinute - seg.startMinute); 
}

/* ─── TIMELINE PIECES ──────────────────────────── */

function renderSegmentPieces(seg, isConflict) {
  const { startMinute:start, endMinute:end } = seg;
  const typeClass = isConflict ? "conflict" : (seg.segmentType || "custom");
  if (end <= 1440) return [pieceMarkup(start, end, typeClass)];
  return [pieceMarkup(start, 1440, typeClass), ...(end-1440 > 0 ? [pieceMarkup(0, end-1440, typeClass)] : [])];
}

function pieceMarkup(s, e, cls) {
  const left  = (s/1440)*100;
  const width = Math.max(1.5, ((e-s)/1440)*100);
  return `<span class="segment-piece ${cls}" style="left:${left}%; width:${width}%"></span>`;
}

/* ─── CALENDAR GRID ────────────────────────────── */

function buildMonthGrid(monthKey) {
  const [year, month] = monthKey.split("-").map(Number);
  const first = new Date(year, month-1, 1);
  const startIndex = (first.getDay()+6)%7;
  const daysInMonth = new Date(year, month, 0).getDate();
  const grid = [];
  for (let i=0; i<startIndex; i++) grid.push({ dateKey:null });
  for (let d=1; d<=daysInMonth; d++) {
    const date = new Date(year, month-1, d);
    grid.push({ dateKey:toDateKey(date), dayNumber:d, weekday:WEEKDAYS[(date.getDay()+6)%7], isCurrentMonth:true });
  }
  while (grid.length%7 !== 0) grid.push({ dateKey:null });
  return grid;
}

/* ─── DATA LAYER ───────────────────────────────── */

function ensureMonth(monthKey) {
  if (!state.data.months[monthKey]) {
    state.data.months[monthKey] = { month:monthKey, days:{} };
    saveData(state.data);
  }
  return state.data.months[monthKey];
}

function ensureDay(monthKey, dateKey) {
  const m = ensureMonth(monthKey);
  if (!m.days[dateKey]) m.days[dateKey] = { date:dateKey, segments:[] };
  return m.days[dateKey];
}

function getMonthData(monthKey) { return ensureMonth(monthKey); }

function getProfileById(profileId) {
  return state.data.profiles.find(p => p.id === profileId)
      || DEFAULT_PROFILES.find(p => p.id === profileId)
      || null;
}

function updateMultiSelectButton() {
  els.multiSelectBtn.textContent = state.multiSelectMode
    ? `多选日期 · ${state.selectedDates.size}` : "多选日期";
  
  // 更新多选按钮的状态样式
  if (state.multiSelectMode) {
    els.multiSelectBtn.classList.add("multi-select-active");
  } else {
    els.multiSelectBtn.classList.remove("multi-select-active");
  }
}

/* ─── QUICK SELECT ─────────────────────────────── */

function quickSelectDates(type) {
  const days = getDaysInMonth(state.currentMonth);
  const today = new Date();
  let datesToSelect = [];

  switch(type) {
    case "week": {
      const dow = today.getDay();
      const diff = today.getDate() - dow + (dow===0 ? -6 : 1);
      const weekStart = new Date(today.getFullYear(), today.getMonth(), diff);
      for (let i=0; i<7; i++) {
        const d = new Date(weekStart); d.setDate(weekStart.getDate()+i);
        const dk = toDateKey(d);
        if (dk.startsWith(state.currentMonth)) datesToSelect.push(dk);
      }
      break;
    }
    case "lastWeek": {
      const dow = today.getDay();
      const diff = today.getDate() - dow + (dow===0 ? -6 : 1) - 7;
      const ws = new Date(today.getFullYear(), today.getMonth(), diff);
      for (let i=0; i<7; i++) {
        const d = new Date(ws); d.setDate(ws.getDate()+i);
        const dk = toDateKey(d);
        if (dk.startsWith(state.currentMonth)) datesToSelect.push(dk);
      }
      break;
    }
    case "workdays":
      datesToSelect = days.filter(dk => { const dw=new Date(dk).getDay(); return dw>=1&&dw<=5; });
      break;
    case "weekends":
      datesToSelect = days.filter(dk => { const dw=new Date(dk).getDay(); return dw===0||dw===6; });
      break;
    case "all":
      datesToSelect = days;
      break;
  }

  state.selectedDates = new Set(datesToSelect);
  showToast(`已选择 ${datesToSelect.length} 个日期`);
  render();
}

/* ─── EXPORT ───────────────────────────────────── */

function exportJSON() {
  downloadFile(`work-hours-${state.currentMonth}.json`, JSON.stringify(state.data, null, 2), "application/json;charset=utf-8");
  showToast("已导出 JSON");
}

function exportCSV() {
  const month = getMonthData(state.currentMonth);
  const rows = [["month","day","segmentId","profileId","profileName","segmentType","start","end","durationMinutes","note"]];
  Object.entries(month.days).forEach(([dk, day]) => {
    day.segments.forEach(seg => {
      const p = getProfileById(seg.profileId);
      rows.push([state.currentMonth, dk, seg.id, seg.profileId, p?.name||seg.profileId, seg.segmentType,
        minuteToTime(seg.startMinute), minuteToTime(seg.endMinute%1440), getSegmentDuration(seg),
        (seg.note||"").replaceAll('"','""')]);
    });
  });
  const csv = rows.map(r => r.map(c => { const v=String(c??""); return /[",\n]/.test(v)?`"${v}"`:v; }).join(",")).join("\n");
  downloadFile(`work-hours-${state.currentMonth}.csv`, csv, "text/csv;charset=utf-8");
  showToast("已导出 CSV");
}

function downloadFile(filename, content, mime) {
  const blob = new Blob([content], { type:mime });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

/* ─── PERSISTENCE ──────────────────────────────── */

function loadData() {
  const raw = localStorage.getItem(STORAGE_KEY);
  if (!raw) return { version:1, profiles:structuredClone(DEFAULT_PROFILES), months:{} };
  try {
    const p = JSON.parse(raw);
    // Merge: keep user customisations but ensure all built-in IDs exist
    const profiles = Array.isArray(p.profiles) && p.profiles.length ? p.profiles : structuredClone(DEFAULT_PROFILES);
    for (const def of DEFAULT_PROFILES) {
      if (!profiles.find(pp => pp.id === def.id)) profiles.unshift(structuredClone(def));
    }
    return { version:1, profiles, months:p.months||{} };
  } catch {
    return { version:1, profiles:structuredClone(DEFAULT_PROFILES), months:{} };
  }
}

function saveData(data) { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }

/* ─── HELPERS ──────────────────────────────────── */

function formatMonthKey(date) {
  return `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,"0")}`;
}

function formatMonthLabel(monthKey) {
  const [y,m] = monthKey.split("-").map(Number);
  return new Intl.DateTimeFormat("zh-CN",{year:"numeric",month:"long"}).format(new Date(y,m-1,1));
}

function shiftMonth(monthKey, delta) {
  const [y,m] = monthKey.split("-").map(Number);
  const d = new Date(y, m-1+delta, 1);
  return formatMonthKey(d);
}

function monthKeyFromDateKey(dateKey) { return dateKey.slice(0,7); }

function getDaysInMonth(monthKey) {
  const [y,m] = monthKey.split("-").map(Number);
  return Array.from({ length: new Date(y,m,0).getDate() }, (_,i) => `${monthKey}-${String(i+1).padStart(2,"0")}`);
}

function toDateKey(date) {
  return `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,"0")}-${String(date.getDate()).padStart(2,"0")}`;
}

function parseTimeToMinute(v) {
  const [h,m] = v.split(":").map(Number);
  if (!Number.isFinite(h)||!Number.isFinite(m)) return NaN;
  return h*60+m;
}

function minuteToTime(minute) {
  const t = ((minute%1440)+1440)%1440;
  return `${String(Math.floor(t/60)).padStart(2,"0")}:${String(t%60).padStart(2,"0")}`;
}

function formatRange(s,e) {
  if (e > 1440) {
    return `${minuteToTime(s)} → 次日${minuteToTime(e - 1440)}`;
  }
  return `${minuteToTime(s)} → ${minuteToTime(e)}`;
}

function formatHours(minutes) {
  const h = minutes/60;
  if (!Number.isFinite(h)||h<0) return "0h";
  return `${h.toFixed(1).replace(/\.0$/,"")}h`;
}

function labelSegmentType(t) {
  return { normal:"正常", overtime:"加班", night:"夜班" }[t] || "自定义";
}

function showToast(msg) {
  els.toast.textContent = msg;
  els.toast.classList.add("show");
  clearTimeout(showToast._t);
  showToast._t = setTimeout(() => els.toast.classList.remove("show"), 2200);
}

function cryptoId() {
  return window.crypto?.randomUUID?.() || `id_${Math.random().toString(36).slice(2)}_${Date.now()}`;
}

function escapeHTML(str) {
  return String(str)
    .replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;")
    .replaceAll('"',"&quot;").replaceAll("'","&#39;");
}
